pipeline_config:
  source_type: tcp_client
  eeg_device: enobio-20
  selected_channels:
  - 0
  - 1
  - 2
  algorithm: theta_beta_ratio
adapter:
  input: mock
  tcp_host: 0.0.0.0
  tcp_port: 1234
  lsl_stream_type: EEG
  lsl_timeout: 8.0
  lsl_channel_map:
    alpha: 0
    theta: 1
    beta: 2
    left_alpha: 3
    right_alpha: 4
policy_cfg:
  # Available: focus (β/(α+θ)), theta_beta (θ/β), alpha_only (α)
  # Note: alpha_only calibration is placeholder — needs formal p5/p95校准
  policy: theta_beta
output:
  udp_host: 127.0.0.1
  udp_port: 5005
  hz: 20.0
  verbose: true
