pipeline_config:
  source_type: tcp_client
  selected_channels: [0, 1, 2]
  algorithm: theta_beta_ratio

adapter:
  input: mock
  tcp_host: 0.0.0.0
  tcp_port: 6001
  lsl_stream_type: EEG
  lsl_timeout: 8.0
  # 支持两种格式：字典或 "k=v,k=v" 字符串
  lsl_channel_map:
    alpha: 0
    theta: 1
    beta: 2
    left_alpha: 3
    right_alpha: 4

policy_cfg:
  policy: focus

output:
  udp_host: 127.0.0.1
  udp_port: 5005
  hz: 20.0
  verbose: true
